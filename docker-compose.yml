services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: file:/data/dev.db
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      TEST_MODE: "false"
    volumes:
      - app_data:/data
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/stats').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  cron:
    image: alpine:3.20
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    env_file: .env
    volumes:
      - ./docker/crontab:/etc/crontabs/root:ro
      - ./docker/cron-claim-fees.sh:/scripts/cron-claim-fees.sh:ro
      - ./docker/cron-distribute.sh:/scripts/cron-distribute.sh:ro
    command: sh -c "apk add --no-cache curl && crond -f -l 8"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  app_data:
  caddy_data:
  caddy_config:
